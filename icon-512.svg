<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#391212" rx="80"/>
  <defs>
    <pattern id="stripes" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="20" height="60" fill="#74342B"/>
      <rect x="20" width="20" height="60" fill="#8FA4D1"/>
      <rect x="40" width="20" height="60" fill="#74342B"/>
    </pattern>
    <clipPath id="cl"><rect width="512" height="512" rx="80"/></clipPath>
  </defs>
  <rect width="512" height="512" fill="url(#stripes)" opacity="0.35" clip-path="url(#cl)"/>
  <text x="256" y="340" font-family="Arial Black, sans-serif" font-size="280" font-weight="900" fill="#EDDBC2" text-anchor="middle" letter-spacing="-10">RR</text>
</svg>